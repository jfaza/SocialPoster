name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint PHP files
        run: |
          find . \
            -path './.git' -prune -o \
            -type f -name '*.php' -print0 \
            | xargs -0 -n 1 php -l
